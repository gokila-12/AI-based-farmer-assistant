{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ text.prices }}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:#f5f5f5;
color:#fff;
}

.page-bg{
min-height:100vh;
background:#a6a3a3 url('{{ url_for("static", filename="images/prices.png") }}') no-repeat center/cover;
background-size:cover;
padding:40px;
}

.dashboard-box{
max-width:1000px;
margin:auto;
background:rgba(34,34,34,0.9);
border-radius:20px;
padding:30px;
box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:15px;
}

.header h2{
font-size:32px;
color:#2ecc71;
}

.header input{
padding:10px 15px;
border-radius:25px;
border:none;
width:300px;
outline:none;
font-size:14px;
}

#livePrice{
margin-top:10px;
font-size:16px;
color:#a0ffa0;
}

.price-list{
max-height:400px;
overflow-y:auto;
margin-top:20px;
background:rgba(103,96,96,0.3);
border-radius:15px;
padding:15px;
}

.price-list li{
padding:12px 15px;
margin-bottom:8px;
border-radius:12px;
background:rgba(160,157,157,0.05);
display:flex;
justify-content:space-between;
}

.price-list li span{
color:#2ecc71;
}
</style>
</head>

<body>

<div class="page-bg">
<div class="dashboard-box">

<div class="header">
<h2>📊 {{ text.prices }}</h2>

<input
type="text"
id="searchInput"
placeholder="{{ text.search_crop }}"
onkeyup="filterCrops()"
>

</div>

<div id="livePrice"></div>

<ul class="price-list" id="cropList">
<li>Rice <span>₹45/kg</span></li>
<li>Wheat <span>₹32/kg</span></li>
<li>Maize <span>₹28/kg</span></li>
<li>Paddy <span>₹40/kg</span></li>
<li>Onion <span>₹35/kg</span></li>
<li>Tomato <span>₹30/kg</span></li>
<li>Potato <span>₹28/kg</span></li>
</ul>

</div>
</div>

<script>

function filterCrops(){

const input=document.getElementById("searchInput").value.toUpperCase();

const li=document.getElementById("cropList").getElementsByTagName("li");

for(let i=0;i<li.length;i++){

const txt=li[i].textContent || li[i].innerText;

li[i].style.display = txt.toUpperCase().includes(input) ? "" : "none";

}

}

function fetchPrice(){

const crop=document.getElementById("searchInput").value;

if(!crop) return;

fetch(`/get-price?crop=${crop}`)

.then(res=>res.json())

.then(data=>{

const live=document.getElementById("livePrice");

if(data.error)

live.innerText="{{ text.crop_not_found }}";

else

live.innerText=`✅ ${data.crop} {{ text.price }}: ₹${data.price} (${data.market}, ${data.district})`;

});

}

document.getElementById("searchInput").addEventListener("keyup",fetchPrice);

</script>

</body>
</html>

{% endblock %}
