<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ text.market }}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:url("{{ url_for('static', filename='images/market.jpg') }}") no-repeat center/cover;
}

.overlay{
min-height:100vh;
background:rgba(0,0,0,0.35);
padding:40px 20px;
}

.market-box{
max-width:1000px;
margin:auto;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(10px);
border-radius:25px;
padding:35px;
color:#fff;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h2{
font-size:32px;
margin-bottom:10px;
}

.header p{
opacity:0.9;
}

.center{
text-align:center;
}

input{
padding:12px 18px;
border:none;
border-radius:25px;
width:70%;
max-width:350px;
outline:none;
font-size:15px;
margin-bottom:15px;
}

.loc-btn{
padding:12px 28px;
border:none;
border-radius:25px;
background:#2ecc71;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.loc-btn:hover{
background:#27ae60;
transform:scale(1.05);
}

.market-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:35px;
}

.market-card{
background:rgba(0,0,0,0.45);
padding:20px;
border-radius:18px;
transition:0.3s;
}

.market-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.market-card h4{
margin-bottom:10px;
font-size:18px;
color:#2ecc71;
}

.market-card p{
font-size:14px;
margin-bottom:5px;
opacity:0.9;
}

.loading{
text-align:center;
margin-top:25px;
font-size:18px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="market-box">

<!-- Header -->

<div class="header">
<h2>🏪 {{ text.market }}</h2>
<p>{{ text.market_desc }}</p>
</div>

<!-- Search Box -->

<div class="center">

<input type="text" id="placeName" placeholder="Enter place name">

<br>

<button class="loc-btn" onclick="searchPlaceMarkets()">
🔍 Search Markets
</button>

</div>

<!-- Nearby Markets -->

<div class="market-list" id="marketList"></div>

<div class="loading" id="loading"></div>

</div>
</div>

<script>

/* SEARCH MARKETS BY PLACE */

async function searchPlaceMarkets(){

const place = document.getElementById("placeName").value;

const marketList = document.getElementById("marketList");
const loading = document.getElementById("loading");

if(!place){

alert("Please enter a place name");
return;

}

marketList.innerHTML = "";
loading.innerHTML = "🌾 Searching agricultural markets...";


try{

/* GET PLACE COORDINATES */

const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${place}`;

const geoRes = await fetch(geoUrl);

const geoData = await geoRes.json();

if(geoData.length === 0){

loading.innerHTML = "❌ Place not found";
return;

}

const lat = geoData[0].lat;
const lon = geoData[0].lon;


/* FETCH MARKETS */

const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];(
node(around:7000,${lat},${lon})["amenity"="marketplace"];
node(around:7000,${lat},${lon})["shop"="farm"];
);out;`;

const res = await fetch(overpassUrl);

const data = await res.json();

loading.innerHTML = "";

if(data.elements.length === 0){

loading.innerHTML = "❌ No nearby agricultural markets found";
return;

}


/* DISPLAY MARKETS */

data.elements.slice(0,10).forEach(m=>{

const name = m.tags.name || "Agricultural Market";

const div = document.createElement("div");

div.className = "market-card";

div.innerHTML = `
<h4>${name}</h4>
<p><strong>Place:</strong> ${place}</p>
<p><strong>Latitude:</strong> ${m.lat}</p>
<p><strong>Longitude:</strong> ${m.lon}</p>
`;

marketList.appendChild(div);

});

}

catch(error){

loading.innerHTML = "⚠️ Error fetching markets";
console.log(error);

}

}

</script>

</body>
</html>
