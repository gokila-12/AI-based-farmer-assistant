{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ text.calendar }}</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:url("/static/images/calendar_bg.png") no-repeat center/cover;
min-height:100vh;
}

.overlay{
min-height:100vh;
background:rgba(0,0,0,0.45);
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
border-radius:25px;
padding:30px;
color:white;
box-shadow:0 25px 50px rgba(0,0,0,0.5);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2ecc71;
}

select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-bottom:20px;
}

.season-card{
background:rgba(60,60,60,0.7);
border-left:5px solid #2ecc71;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.season-title{
font-weight:bold;
color:#2ecc71;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h2>🗓 {{ text.calendar }}</h2>

<select id="stateSelect" onchange="loadCalendar()">

<option value="">{{ text.select_state }}</option>

<option value="Andhra Pradesh">Andhra Pradesh</option>
<option value="Arunachal Pradesh">Arunachal Pradesh</option>
<option value="Assam">Assam</option>
<option value="Bihar">Bihar</option>
<option value="Chhattisgarh">Chhattisgarh</option>
<option value="Goa">Goa</option>
<option value="Gujarat">Gujarat</option>
<option value="Haryana">Haryana</option>
<option value="Himachal Pradesh">Himachal Pradesh</option>
<option value="Jharkhand">Jharkhand</option>
<option value="Karnataka">Karnataka</option>
<option value="Kerala">Kerala</option>
<option value="Madhya Pradesh">Madhya Pradesh</option>
<option value="Maharashtra">Maharashtra</option>
<option value="Manipur">Manipur</option>
<option value="Meghalaya">Meghalaya</option>
<option value="Mizoram">Mizoram</option>
<option value="Nagaland">Nagaland</option>
<option value="Odisha">Odisha</option>
<option value="Punjab">Punjab</option>
<option value="Rajasthan">Rajasthan</option>
<option value="Sikkim">Sikkim</option>
<option value="Tamil Nadu">Tamil Nadu</option>
<option value="Telangana">Telangana</option>
<option value="Tripura">Tripura</option>
<option value="Uttar Pradesh">Uttar Pradesh</option>
<option value="Uttarakhand">Uttarakhand</option>
<option value="West Bengal">West Bengal</option>

</select>

<div id="calendarResult"></div>

</div>
</div>

<script>

async function loadCalendar(){

const state=document.getElementById("stateSelect").value;
const resultBox=document.getElementById("calendarResult");

if(!state){
resultBox.innerHTML="";
return;
}

resultBox.innerHTML="🌾 {{ text.loading_calendar }}";

try{

const res=await fetch(`/get-calendar?state=${state}`);
const data=await res.json();

if(data.error){

resultBox.innerHTML=`<div class="season-card">${data.error}</div>`;
return;

}

resultBox.innerHTML="";

data.forEach(season=>{

resultBox.innerHTML+=`

<div class="season-card">

<div class="season-title">🌦 ${season.season}</div>

🌱 {{ text.sowing }}: ${season.sowing}<br>

🌿 {{ text.planting }}: ${season.planting}<br>

🌾 {{ text.harvest }}: ${season.harvest}

</div>

`;

});

}catch(err){

resultBox.innerHTML=`<div class="season-card">⚠️ {{ text.error_loading_calendar }}</div>`;

}

}

</script>

</body>
</html>

{% endblock %}
