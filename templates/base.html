<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Smart Farmer Assistant" }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'ml,ta,te,kn,hi,en',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
   
</head>

<body>
    <div style="position:fixed;top:10px;right:20px;z-index:9999">
    <div id="google_translate_element"></div>
</div>

    <!-- 🌍 Language Selector -->
    <div class="global-translator">
    <form action="/set-language" method="POST">
        <select name="lang" onchange="this.form.submit()">
            <option value="en">English</option>
            <option value="ml">Malayalam</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="kn">Kannada</option>
            <option value="hi">Hindi</option>
        </select>
    </form>
</div>
    {% block content %}{% endblock %}

</body>
</html>
